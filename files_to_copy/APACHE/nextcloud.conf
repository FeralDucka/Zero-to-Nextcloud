<VirtualHost *:80>
    RewriteEngine on
    RewriteCond %{HTTPS} !on
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301]
    ProxyPreserveHost On
    ServerName [TLD]
    DocumentRoot /var/www/nextcloud
    Protocols h2 h2c
    <Directory /var/www/nextcloud/>
        Satisfy All
        Require all denied
        Options -Indexes
        AllowOverride All
        <IfModule mod_dav.c>
            Dav off
        </IfModule>
    </Directory>
    ErrorLog /mnt/WEBSERVER_LOGS/apache/nextcloud.error.log
    CustomLog /mnt/WEBSERVER_LOGS/apache/nextcloud.access.log info
</VirtualHost>
<VirtualHost *:443>
    ServerName [TLD]
    DocumentRoot /var/www/nextcloud
    Protocols h2 h2c
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/var/run/php/php8.2-fpm.sock|fcgi://localhost"
    </FilesMatch>
    <Directory /var/www/nextcloud/>
        Satisfy Any
        Require all granted
        Options FollowSymlinks MultiViews
        AllowOverride All
        LimitRequestBody 68719476736
        <IfModule mod_dav.c>
            Dav off
        </IfModule>
    </Directory>
    <IfModule mod_security2.c>
        SecRequestBodyLimit 68719476736
        SecRequestBodyNoFilesLimit 68719476736
        SecRequestBodyInMemoryLimit 2147483648
        SecRequestBodyAccess On
        SecRequestBodyLimitAction ProcessPartial
        # Enable file listing
        SecRuleRemoveById 911100
        SecRuleRemoveById 920420
        # Enable upload of .exe files
        SecRule FILES_NAMES "\.(exe|bat|sh)$" "id:000001,phase:2,allow,t:none,msg:'Allow .exe file uploads'"
    </IfModule>
    <IfModule mod_headers.c>
        Header always set Strict-Transport-Security "max-age=86400; includeSubDomains; preload"
    </IfModule>
    ErrorLog /mnt/WEBSERVER_LOGS/apache/nextcloud_ssl.error.log
    CustomLog /mnt/WEBSERVER_LOGS/apache/nextcloud_ssl.access.log info
    SSLEngine on
    SSLProtocol -All +TLSv1.3
    SSLCipherSuite HIGH:!aNULL:!MD5
    SSLCertificateFile /etc/ssl/certs/apache/apache-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/apache/apache-selfsigned.key
</VirtualHost>
